# Render Blueprint — деплой Telegram-бота как Background Worker.
# Документация: https://render.com/docs/blueprint-spec

services:
  - type: worker
    name: tg-bot-2328
    
    webhooks:
      - name: set-webhook
        run: curl -sS https://capitalia-beok.onrender.com/set_webhook
    runtime: python
    pythonVersion: "3.11"
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      # Секреты (задаются вручную в панели Render)
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PROJECT_UUID
        sync: false
      - key: API_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false

      # Переменные окружения (можно оставить здесь или задавать в Render)
      - key: DEFAULT_CURRENCY
        value: USD
      - key: DEFAULT_TTL
        value: "3600"
      - key: LIST_LIMIT
        value: "10"
      - key: LONG_POLL_TIMEOUT
        value: "30"
      - key: REQUEST_TIMEOUT
        value: "30"

      # Важные системные переменные для стабильности worker'а
      - key: PYTHONUNBUFFERED
        value: "1" # Отключает буферизацию вывода, чтобы логи в Render появлялись сразу
      - key: RENDER_AUTO_DEPROVISION
        value: "never" # (Опционально) Защищает от автоостановки при простое

    # Автоматический деплой при изменениях в ветке
    autoDeploy: true

    # (Опционально) Если у вас есть база данных, её можно подключить здесь
    # database:
    #   name: my-telegram-bot-db
